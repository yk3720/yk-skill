<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule - <!-- TITLE --></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #fdfcf0; /* Warm Beige */
            color: #4b5d40; /* Natural Green */
        }
        .paper {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e5e5;
            background-color: white;
            border-radius: 0.5rem;
            height: 100%;
        }
        .time-line {
            position: relative;
        }
        .time-line::before {
            content: '';
            position: absolute;
            left: 1.15rem;
            top: 1rem;
            bottom: 1rem;
            width: 1px;
            background-color: #c8d8c0;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-[1400px] mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="calendar"></i>
                <!-- HEADER_TEXT -->
            </h1>
            <p class="text-sm mt-1 opacity-80">無理のない、着実な一歩を。</p>
        </div>

        <!-- Navigation Buttons -->
        <div class="flex justify-center gap-4 mb-8">
            <!-- NAV_BUTTONS -->
        </div>

        <!-- Content Grid -->
        <div class="grid grid-cols-1 <!-- GRID_LAYOUT --> gap-6">
            <!-- CONTENT_CARDS -->
        </div>
    </div>
