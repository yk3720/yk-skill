<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule - 2026/03/30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #fdfcf0; /* Warm Beige */
            color: #4b5d40; /* Natural Green */
        }
        .paper {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e5e5;
        }
        .time-line {
            position: relative;
        }
        .time-line::before {
            content: '';
            position: absolute;
            left: 1.15rem;
            top: 1rem;
            bottom: 1rem;
            width: 1px;
            background-color: #c8d8c0;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-8">
    <div class="max-w-md mx-auto paper bg-white rounded-lg overflow-hidden">
        <!-- Navigation -->
        <div class="flex justify-between items-center bg-[#fdfcf0] p-4 text-xs">
            <a href="index.html" class="flex items-center gap-1 hover:underline text-[#4b5d40]">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                03/29
            </a>
            <span class="font-bold text-lg">03/30 (月)</span>
            <a href="2026-03-31.html" class="flex items-center gap-1 hover:underline text-[#4b5d40]">
                03/31
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </a>
        </div>

        <!-- Header -->
        <div class="bg-[#e8f0e0] p-6 border-b border-[#c8d8c0]">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="calendar"></i>
                2026/03/30
            </h1>
            <p class="text-sm mt-1 opacity-80">新しい1週間の始まり。</p>
        </div>

        <!-- Schedule List -->
        <div class="p-6 time-line">
            <div class="space-y-4">
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">06:00</span>
                    <i data-lucide="sun" class="w-5 h-5"></i>
                    <span class="font-bold">起床</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">08:30</span>
                    <i data-lucide="truck" class="w-5 h-5"></i>
                    <span class="font-bold">野菜の出荷作業</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">13:00</span>
                    <i data-lucide="star" class="w-5 h-5 text-blue-400"></i>
                    <span class="font-bold">占星術：チャート作成練習</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">15:00</span>
                    <i data-lucide="leaf" class="w-5 h-5 text-green-500"></i>
                    <span class="font-bold">畑の様子見</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">22:30</span>
                    <i data-lucide="moon" class="w-5 h-5"></i>
                    <span>就寝</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Home Button -->
    <div class="max-w-md mx-auto mt-6 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 px-4 py-2 bg-[#e8f0e0] rounded-full text-sm font-bold shadow-sm hover:bg-[#d8e0d0] transition-colors">
            <i data-lucide="home" class="w-4 h-4"></i>
            今日へ戻る
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
