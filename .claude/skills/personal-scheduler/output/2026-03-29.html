<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule - 2026/03/29</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #fdfcf0; /* Warm Beige */
            color: #4b5d40; /* Natural Green */
        }
        .paper {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e5e5;
        }
        .time-line {
            position: relative;
        }
        .time-line::before {
            content: '';
            position: absolute;
            left: 1.15rem;
            top: 1rem;
            bottom: 1rem;
            width: 1px;
            background-color: #c8d8c0;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-8">
    <div class="max-w-md mx-auto paper bg-white rounded-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-[#e8f0e0] p-6 border-b border-[#c8d8c0]">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="calendar"></i>
                2026/03/29
            </h1>
            <p class="text-sm mt-1 opacity-80">無理のない、着実な一歩を。</p>
        </div>

        <!-- Schedule List -->
        <div class="p-6 time-line">
            <div class="space-y-4">
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">06:00</span>
                    <i data-lucide="sun" class="w-5 h-5"></i>
                    <span class="font-bold">起床</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">06:30</span>
                    <i data-lucide="home" class="w-5 h-5 text-gray-400"></i>
                    <span>朝食・掃除 (固定)</span>
                </div>
                <div class="flex items-center gap-4 text-orange-400 bg-orange-50 rounded-md p-1">
                    <span class="w-12 text-xs">08:00</span>
                    <i data-lucide="clock" class="w-5 h-5"></i>
                    <span class="text-xs italic">バッファー (30分)</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">08:30</span>
                    <i data-lucide="truck" class="w-5 h-5"></i>
                    <span class="font-bold">野菜の出荷作業</span>
                </div>
                <div class="flex items-center gap-4 text-orange-400 bg-orange-50 rounded-md p-1">
                    <span class="w-12 text-xs">11:30</span>
                    <i data-lucide="clock" class="w-5 h-5"></i>
                    <span class="text-xs italic">バッファー (30分)</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">12:00</span>
                    <i data-lucide="utensils" class="w-5 h-5"></i>
                    <span>昼食・休憩</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">13:00</span>
                    <i data-lucide="star" class="w-5 h-5 text-blue-400"></i>
                    <span class="font-bold">占星術の基礎復習</span>
                </div>
                <div class="flex items-center gap-4 text-orange-400 bg-orange-50 rounded-md p-1">
                    <span class="w-12 text-xs">13:15</span>
                    <i data-lucide="clock" class="w-5 h-5"></i>
                    <span class="text-xs italic">バッファー (45分)</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">14:00</span>
                    <i data-lucide="leaf" class="w-5 h-5 text-green-500"></i>
                    <span class="font-bold">農業のテキスト学習</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">15:30</span>
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span>夕飯の買い物</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">18:30</span>
                    <i data-lucide="home" class="w-5 h-5 text-gray-400"></i>
                    <span>夕食・片付け</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-12 text-xs opacity-60">22:30</span>
                    <i data-lucide="moon" class="w-5 h-5"></i>
                    <span>就寝</span>
                </div>
            </div>
        </div>

        <!-- Memo Section -->
        <div class="p-6 bg-[#faf9f0] border-t border-[#e5e5e5]">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i data-lucide="pen-tool"></i>
                明日のためのメモ
            </h2>
            <ul class="space-y-2 text-sm">
                <li class="flex items-center gap-2 italic">
                    <i data-lucide="info" class="w-4 h-4 text-blue-400"></i>
                    余裕を持ってバッファーを合計2時間半確保しました。
                </li>
                <li class="flex items-center gap-2 italic">
                    <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
                    出荷作業の合間に深呼吸を忘れずに！
                </li>
            </ul>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
